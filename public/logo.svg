<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Charcoal rounded square background -->
  <rect width="512" height="512" rx="85" fill="#292524"/>
  <!-- Center -->
  <g transform="translate(256 256)">
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="26" fill="#FAF8F3"/>
    <!-- 3 orbital ellipses at 0°, 60°, 120° -->
    <g stroke="#FAF8F3" stroke-width="5" fill="none">
      <ellipse cx="0" cy="0" rx="170" ry="55" transform="rotate(0)"/>
      <ellipse cx="0" cy="0" rx="170" ry="55" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="170" ry="55" transform="rotate(120)"/>
    </g>
  </g>
</svg>
